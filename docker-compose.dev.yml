version: '3.9'

services:
  nginx:
    ports:
      - "8080:80"

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    volumes:
      - ./gateway:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=9000
      - OCPP_SECURITY_PROFILE=0
    ports:
      - "9000:9000"
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --reload
    deploy:
      replicas: 1

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    environment:
      - DATABASE_URL=postgresql://chargeplus:chargeplus@db:5432/chargeplus
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=dev-secret-key-not-for-production
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development
      - ALLOWED_HOSTS=*
      - MB_SECRET_KEY=6ca6af4578753e1afae2eb864f8aa288
      - MB_ACCESS_CODE=DNHXPHRNMZ
      - MB_MERCHANT_ID=114743
      - MB_SANDBOX=true
      - MB_IPN_URL=http://backend:8000/api/payment/ipn/
      - MB_RETURN_URL=http://localhost:8080/api/payment/return/
      - MB_CANCEL_URL=http://localhost:8080/api/payment/cancel/
      - MB_PREPAID_AMOUNT=100000
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  worker-core:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development
    deploy:
      replicas: 1

  worker-telemetry:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development
    deploy:
      replicas: 1

  worker-management:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development

  worker-commands:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development
      - MB_SECRET_KEY=6ca6af4578753e1afae2eb864f8aa288
      - MB_ACCESS_CODE=DNHXPHRNMZ
      - MB_MERCHANT_ID=114743
      - MB_SANDBOX=true
      - MB_IPN_URL=http://backend:8000/api/payment/ipn/
      - MB_RETURN_URL=http://localhost:8080/api/payment/return/
      - MB_CANCEL_URL=http://localhost:8080/api/payment/cancel/

  dispatcher:
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=chargeplus.settings.development

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
