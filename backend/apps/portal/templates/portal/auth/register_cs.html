{% extends "portal/base.html" %}
{% block title %}고객센터 가입 - ChargePlus{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <h4 class="fw-bold"><i class="bi bi-headset text-danger me-2"></i>고객센터 가입</h4>
      <p class="text-muted small">Django 관리자에서 직접 승인 처리됩니다.</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">아이디 <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">이름</label>
            <input type="text" name="first_name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">이메일</label>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">연락처</label>
            <input type="text" name="phone" class="form-control" placeholder="010-0000-0000">
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호 <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label">비밀번호 확인 <span class="text-danger">*</span></label>
            <input type="password" name="password2" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-danger w-100">가입 신청</button>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="{% url 'portal:register_select' %}" class="text-muted small">뒤로</a>
    </div>
  </div>
</div>
{% endblock %}
