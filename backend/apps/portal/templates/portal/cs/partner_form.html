{% extends "portal/cs/base_cs.html" %}
{% block title %}파트너 추가 - CS{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <h4 class="fw-bold mb-0">파트너 추가</h4>
</div>
<div class="card shadow-sm" style="max-width:520px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <h6 class="text-muted mb-3">계정 정보</h6>
      <div class="mb-3">
        <label class="form-label">아이디 <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">담당자명</label>
        <input type="text" name="first_name" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">이메일</label>
        <input type="email" name="email" class="form-control">
      </div>
      <hr>
      <h6 class="text-muted mb-3">사업체 정보</h6>
      <div class="mb-3">
        <label class="form-label">사업체명 <span class="text-danger">*</span></label>
        <input type="text" name="business_name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">사업자번호</label>
        <input type="text" name="business_no" class="form-control" placeholder="000-00-00000">
      </div>
      <div class="mb-4">
        <label class="form-label">담당자 연락처</label>
        <input type="text" name="contact_phone" class="form-control">
      </div>
      <p class="text-muted small">※ 초기 비밀번호: <code>ChargePlus1234!</code> (생성 후 안내)</p>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="{% url 'portal:cs_partners' %}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
