{% extends "portal/cs/base_cs.html" %}
{% block title %}사용자 추가 - CS{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <h4 class="fw-bold mb-0">사용자 추가</h4>
</div>

<div class="card shadow-sm" style="max-width:560px;">
  <div class="card-body p-4">
    <form method="post" id="userForm">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">역할 <span class="text-danger">*</span></label>
        <select name="role" class="form-select" id="roleSelect" required>
          <option value="customer">고객</option>
          <option value="partner">파트너</option>
          <option value="cs">고객센터</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">아이디 <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">임시 비밀번호 <span class="text-danger">*</span></label>
        <input type="text" name="password" class="form-control" value="ChargePlus1234!" required>
      </div>
      <div class="mb-3">
        <label class="form-label">이름</label>
        <input type="text" name="first_name" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">이메일</label>
        <input type="email" name="email" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">연락처</label>
        <input type="text" name="phone" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">상태</label>
        <select name="status" class="form-select">
          <option value="active">활성</option>
          <option value="pending">승인대기</option>
        </select>
      </div>

      <!-- Partner extra fields -->
      <div id="partnerFields" style="display:none;">
        <hr>
        <h6 class="text-muted mb-3">사업체 정보</h6>
        <div class="mb-3">
          <label class="form-label">사업체명</label>
          <input type="text" name="business_name" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">사업자번호</label>
          <input type="text" name="business_no" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">담당자 연락처</label>
          <input type="text" name="contact_phone" class="form-control">
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="{% url 'portal:cs_users' %}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('roleSelect').addEventListener('change', function() {
    document.getElementById('partnerFields').style.display =
      this.value === 'partner' ? '' : 'none';
  });
</script>
{% endblock %}
